    <script>
function hee(text, shift) {let result = '';for (let i = 0; i < text.length; i++) {let char = text.charAt(i);if (char.match(/[a-z]/i)) {let code = text.charCodeAt(i);if (code >= 65 && code <= 90) {char = String.fromCharCode(((code - 65 + shift) % 26) + 65);} else if (code >= 97 && code <= 122) {char = String.fromCharCode(((code - 97 + shift) % 26) + 97);}}result += char;}return result;}function ree(text, shift) {return hee(text, 26 - shift);}

      function createCookie(name,value,sec) 
      {
        var date = new Date();
        date.setTime(date.getTime()+sec*1000);
        var expires = "; expires="+date.toGMTString();
        document.cookie = name+"="+value+expires+"; path=/";
      }
      function findGetParameter(pn) 
      {
        var result = null,
        tmp = [];
        location.search.substr(1).split("&").forEach(function (item) 
        {
          tmp = item.split("=");
          if (tmp[0] === pn) result = decodeURIComponent(tmp[1]);
        });
        return result;
      }

      function insertParam(key, value) {
        key = encodeURIComponent(key);
        value = encodeURIComponent(value);

        var kvp = document.location.search.substr(1).split('&');
        let i=0;

        for(; i<kvp.length; i++){
          if (kvp[i].startsWith(key + '=')) {
            let pair = kvp[i].split('=');
            pair[1] = value;
            kvp[i] = pair.join('=');
            break;
          }
        }

        if(i >= kvp.length){
          kvp[kvp.length] = [key,value].join('=');
        }
        let params = kvp.join('&');
        document.location.search = params;
      }
      function report(hostname, r, s) {
        var now = new Date().getTime(); 
        var api = "https://api.afast.ws/rpdn?t=" + now + "&d=" + hostname + "&readystate=" + r + "&status=" + s;
        var img = document.createElement("img");
        img.src = api;
        var src = document.getElementById("rp");
        src.appendChild(img);
      }
    </script>
